---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-security-rancher-io-v1alpha1-workloadpolicy
  failurePolicy: Fail
  name: validate-workloadpolicies.rancher.io
  rules:
  - apiGroups:
    - security.rancher.io
    apiVersions:
    - v1alpha1
    operations:
    - DELETE
    resources:
    - workloadpolicies
  sideEffects: None
