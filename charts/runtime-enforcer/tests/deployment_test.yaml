suite: "Controller Deployment Tests"
templates:
  - "templates/controller/deployment.yaml"

tests:
  - it: "should render component and default container"
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: "controller"
      - equal:
          path: spec.template.metadata.annotations["kubectl.kubernetes.io/default-container"]
          value: "manager"

  - it: "should allow replicas to be overridden"
    set:
      controller:
        replicas: 5
    asserts:
      - equal:
          path: "spec.replicas"
          value: 5

  - it: "should render default priority class name"
    asserts:
      - equal:
          path: "spec.template.spec.priorityClassName"
          value: "runtime-enforcer-priorityclass"

  - it: "should include grpc Port argument"
    set:
      agent:
        grpcExporterPort: "12"
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--wp-status-reconciler-agent-grpc-port=12"

  - it: "should set update interval argument"
    set:
      controller:
        wpStatusUpdateInterval: "1s"
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--wp-status-reconciler-update-interval=1s"

  - it: "controller should get the correct label selector string"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--wp-status-reconciler-agent-label-selector=app.kubernetes.io/compone\
            nt=agent,app.kubernetes.io/instance=RELEASE-NAME,app.kubernetes.io/\
            name=runtime-enforcer"
