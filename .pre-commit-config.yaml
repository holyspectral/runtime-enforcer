fail_fast: false
minimum_pre_commit_version: '0'
repos:
  # more info on the usage: https://github.com/golangci/golangci-lint/blob/main/.pre-commit-hooks.yaml
  - repo: https://github.com/golangci/golangci-lint
    rev: 72798d34b1eb36745915b0d4eea5c2b3b31bdfe3 # v2.9.0
    hooks:
      - id: golangci-lint
        stages: [pre-commit]
        language_version: 1.26.0
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: 7d85583be209cb547946c82fbe51f4bc5dd1d017 # v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        stages: [pre-commit]
- repo: https://github.com/pocc/pre-commit-hooks
  rev: master
  hooks:
  - id: clang-tidy
    args:
    - --checks='bugprone-*,performance-*,readability-*,portability-*,modernize-*,clang-analyzer-*'
    - --version=18.1.3
    - --extra-arg=--target=bpf
    - --extra-arg=-I/usr/include/
    - --extra-arg=-D__TARGET_ARCH_x86
    files: bpf/main.c
- repo: https://github.com/cpp-linter/cpp-linter-hooks
  rev: v1.1.11  # Use the tag or commit you want
  hooks:
  - id: clang-tidy
    args:
      - --checks='bugprone-*,performance-*,readability-*,portability-*,modernize-*,clang-analyzer-*'
      - --version=18
      - --extra-arg=--target=bpf
      - --extra-arg=-I/usr/include/
      - --extra-arg=-D__TARGET_ARCH_x86
    files: bpf/main.c
