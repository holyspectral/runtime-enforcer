name: Update RuntimeEnforcer chart versions

sources:
  chartVersion:
    name: "Get latest runtime-enforcer helm version"
    kind: yaml
    transformers:
      - semverinc: patch
    spec:
      file: charts/runtime-enforcer/Chart.yaml
      key: $.version
  releaseVersion:
    name: "Get latest runtime-enforcer version"
    kind: githubrelease
    typefilter:
      prerelease: true
    spec:
      owner: '{{ requiredEnv .github.owner }}'
      repository: runtime-enforcer
      token: '{{ requiredEnv .github.token }}'
      versionfilter:
        kind: "semver"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.author }}"
      email: "{{ .github.email }}"
      directory: "/tmp/helm-charts"
      owner: "{{ requiredEnv .github.owner }}"
      repository: "runtime-enforcer"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ requiredEnv .github.user }}"
      branch: "{{ .github.branch }}"
      commitusingapi: true
      commitmessage:
        type: "chore"
        title: "update runtime enforcer helm charts"
        hidecredit: true
        footers: "Signed-off-by: RuntimeEnforcer bot <runtime-enforcer-bot@users.noreply.github.com>"

conditions:
  release:
    name: Check if the latest runtime-enforcer release is a official release
    disablesourceinput: true
    kind: shell
    spec:
      command: 'echo {{ source releaseVersion }} | grep -E "v[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+"'
  prerelease:
    name: Check if the latest runtime-enforcer release is a pre-release.
    disablesourceinput: true
    kind: shell
    spec:
      command: 'echo {{ source releaseVersion }} | grep -E "v[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+" && exit 1'

actions:
  create-release-pr:
    title: 'chore: helm chart {{ source "chartVersion" }} release'
    dependson:
      - condition#release:and
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      description: |
        Automatic Helm chart {{ source "chartVersion" }} update.
        This PR has been created by the automation used to automatically update the Helm charts when RuntimeEnforcer is released or helm chart content is updated.
        REMEMBER IF YOU WANT TO MERGE IN A SINGLE COMMIT CHANGES AND VERSION BUMP, YOU MUST SQUASH THE COMMIT BEFORE MERGING THIS PR!
      draft: false
      labels:
        - "chore"
  create-prerelease-pr:
    title: 'chore: helm chart {{ source "chartVersion" }}-{{ source "releaseVersion" }} release'
    dependson:
      - condition#prerelease:and
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      description: |
        Automatic Helm chart {{ source "chartVersion" }}-{{ source "releaseVersion" }} update.
        This PR has been created by the automation used to automatically update the Helm charts when RuntimeEnforcer is released or helm chart content is updated.
        REMEMBER IF YOU WANT TO MERGE IN A SINGLE COMMIT CHANGES AND VERSION BUMP, YOU MUST SQUASH THE COMMIT BEFORE MERGING THIS PR!
      draft: false
      labels:
        - "chore"

targets:
  update_helm_version_release:
    scmid: default
    name: update Helm chart version
    dependson:
      - condition#release:and
    kind: yaml
    sourceid: chartVersion
    spec:
      file: charts/runtime-enforcer/Chart.yaml
      key: $.version
  update_helm_version_prerelease:
    scmid: default
    name: update Helm chart version
    dependson:
      - condition#prerelease:and
    kind: yaml
    spec:
      file: charts/runtime-enforcer/Chart.yaml
      key: $.version
      value: '{{ source "chartVersion" }}-{{ source "releaseVersion" }}'
  update_appversion:
    scmid: default
    name: update Helm chart appVersion
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/runtime-enforcer/Chart.yaml
      key: $.appVersion
  update_controller_version:
    scmid: default
    name: update Helm chart controller version
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/runtime-enforcer/values.yaml
      key: $.controller.image.tag
  update_agent_version:
    scmid: default
    name: update Helm chart agent version
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/runtime-enforcer/values.yaml
      key: $.agent.image.tag
  update_debugger_version:
    scmid: default
    name: update Helm chart debugger version
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/runtime-enforcer/values.yaml
      key: $.debugger.image.tag
  generate_values_schema:
    kind: shell
    disablesourceinput: true
    scmid: default
    name: Generate values.schema.json file
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - charts/runtime-enforcer/values.schema.json
      command: |
        make generate-chart
